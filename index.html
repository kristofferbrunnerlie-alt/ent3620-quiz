<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }

  /* Menu */
  .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .menu-btn .label { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }

  .menu-btn.all:hover { background: #1a3d20; border-color: #4a9f5a; }

  /* Quiz */
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #333; }

  .quiz-header .back:hover { border-color: #888; color: #fff; }
  .progress { font-size: 14px; color: #888; }
  .progress .score { color: #4a9f5a; font-weight: 600; }

  .question-num { font-size: 12px; color: #4a6fa5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .question { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 24px; line-height: 1.4; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { background: #1a1a2e; border: 2px solid #333; border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.2s; font-size: 15px; line-height: 1.4; }
  .option:hover:not(.disabled) { border-color: #4a6fa5; background: #16213e; }
  .option.correct { border-color: #4a9f5a; background: #1a3d20; }
  .option.wrong { border-color: #9f4a4a; background: #3d1a1a; }
  .option.disabled { cursor: default; opacity: 0.6; }
  .option.disabled.correct { opacity: 1; }

  .explanation { margin-top: 16px; padding: 16px; background: #1a2e1a; border: 1px solid #2d5a3d; border-radius: 10px; font-size: 14px; line-height: 1.5; display: none; }
  .explanation.wrong-exp { background: #2e1a1a; border-color: #5a2d2d; }

  .next-btn { margin-top: 20px; background: #4a6fa5; color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; display: none; transition: background 0.2s; }
  .next-btn:hover { background: #5a8fc5; }

  /* Streak & gamification */
  .streak-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; min-height: 32px; }
  .streak-badge { background: #2d1a3d; border: 1px solid #6a3d8a; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #c49aef; font-weight: 600; display: none; }
  .streak-badge.active { display: inline-flex; align-items: center; gap: 6px; animation: pulse 0.5s ease; }
  .streak-badge.fire { background: #3d2d1a; border-color: #8a6a3d; color: #efc49a; }
  .streak-badge.super { background: #3d1a1a; border-color: #c44a4a; color: #ff8a8a; animation: glow 1s ease infinite alternate; }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
  @keyframes glow { 0% { box-shadow: 0 0 5px #c44a4a40; } 100% { box-shadow: 0 0 20px #c44a4a80; } }
  @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes correctFlash { 0% { background: #1a3d20; } 50% { background: #2a5d30; } 100% { background: #1a3d20; } }
  @keyframes wrongShake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }
  @keyframes confettiFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
  .option.correct { animation: correctFlash 0.6s ease; }
  .option.wrong { animation: wrongShake 0.4s ease; }
  .question { animation: slideUp 0.3s ease; }
  .feedback-msg { font-size: 18px; font-weight: 700; margin-bottom: 8px; animation: pulse 0.4s ease; }
  .feedback-msg.correct-msg { color: #4a9f5a; }
  .feedback-msg.wrong-msg { color: #9f4a4a; }
  .confetti { position: fixed; top: -10px; pointer-events: none; z-index: 9999; font-size: 20px; animation: confettiFall 2s ease forwards; }
  .combo-text { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 42px; font-weight: 900; pointer-events: none; z-index: 9998; opacity: 0; }

  /* Results */
  .results { text-align: center; padding: 40px 0; }
  .results .big-score { font-size: 64px; font-weight: 700; color: #4a9f5a; }
  .results .big-score.low { color: #c9a227; }
  .results .big-score.fail { color: #9f4a4a; }
  .results .out-of { font-size: 18px; color: #888; margin-bottom: 30px; }
  .results .grade { font-size: 24px; margin-bottom: 10px; }
  .retry-btn { background: #4a6fa5; color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin: 8px; }
  .retry-btn.secondary { background: transparent; border: 1px solid #555; }

  .wrong-review { text-align: left; margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; }
  .wrong-review h3 { margin-bottom: 16px; color: #9f4a4a; }
  .wrong-item { background: #1a1a2e; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .wrong-item .wq { font-weight: 600; margin-bottom: 8px; }
  .wrong-item .wa { color: #9f4a4a; font-size: 14px; }
  .wrong-item .wc { color: #4a9f5a; font-size: 14px; }

  .hidden { display: none !important; }

  .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-bottom: 20px; }
  .progress-bar .fill { height: 100%; background: #4a6fa5; border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>
<div class="container">
  <!-- MENU SCREEN -->
  <div id="menu-screen">
    <h1>ENT3620 Quiz</h1>
    <p class="subtitle">Innovation Strategy and Technological Change — Exam April 7th</p>
    <div class="menu" id="menu-buttons"></div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="hidden">
    <div class="quiz-header">
      <button class="back" onclick="showMenu()">Back</button>
      <div class="progress">
        <span id="q-progress">1/10</span> | Score: <span class="score" id="q-score">0</span>
      </div>
    </div>
    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
    <div class="streak-bar">
      <div class="streak-badge" id="streak-badge"></div>
    </div>
    <div id="feedback-msg"></div>
    <div class="question-num" id="q-label">Question 1</div>
    <div class="question" id="q-text"></div>
    <div class="options" id="q-options"></div>
    <div class="explanation" id="q-explanation"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question</button>

  <!-- RESULTS SCREEN -->
  <div id="results-screen" class="hidden">
    <div class="results">
      <div class="big-score" id="r-score">8</div>
      <div class="out-of" id="r-out-of">out of 10 correct</div>
      <div class="grade" id="r-grade"></div>
      <button class="retry-btn" onclick="retryWrong()">Retry Wrong Answers</button>
      <button class="retry-btn secondary" onclick="showMenu()">Back to Menu</button>
      <div class="wrong-review hidden" id="wrong-review">
        <h3>Questions you got wrong:</h3>
        <div id="wrong-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// QUESTION BANK — organized by lecture
// ============================================================
const questionBank = {
  "Lecture 1: Introduction": [
    {
      q: "What is the difference between invention and innovation?",
      options: [
        "Invention is creating something new; innovation is the practical implementation of an idea new to the market",
        "They mean the same thing but in different contexts",
        "Innovation always comes before invention",
        "Invention requires a patent; innovation does not"
      ],
      correct: 0,
      explanation: "Invention = creating something entirely new. Innovation = practical implementation of an idea that is new to the market. Most inventions never become innovations."
    },
    {
      q: "Dell Computers beating IBM by using build-to-order and pay-in-advance is an example of:",
      options: [
        "Radical technological innovation",
        "Architectural innovation",
        "Business model innovation",
        "Process innovation"
      ],
      correct: 2,
      explanation: "Dell changed HOW it sold, not WHAT it sold. This is business model innovation — a non-technological innovation that changed the competitive landscape."
    },
    {
      q: "Which of the following is an example of technological innovation?",
      options: [
        "Amazon's 1-click buy button",
        "Dell's build-to-order model",
        "Nanofabrication and fuel cells",
        "A new marketing campaign"
      ],
      correct: 2,
      explanation: "Technological innovation involves applying tools, materials, and processes to create new solutions. Nanofabrication and fuel cells use technical knowledge. Amazon's 1-click is marketing innovation; Dell's model is business model innovation."
    },
    {
      q: "According to the course introduction, technological innovation can be:",
      options: [
        "Only the result of deliberate R&D efforts",
        "Both planned and accidental",
        "Only accidental, like penicillin",
        "Only relevant to software companies"
      ],
      correct: 1,
      explanation: "Shane gives Penicillin (Fleming) as an example of accidental innovation and deliberate R&D as planned. Both types matter."
    },
    {
      q: "What is a 'complementor'?",
      options: [
        "A competitor that copies your product",
        "A firm whose products increase the value of other firms' products",
        "A supplier that provides raw materials",
        "A customer who adopts a product early"
      ],
      correct: 1,
      explanation: "From the course dictionary: a complementor is a firm that increases the value of other firms' products. Example: game developers are complementors to console makers."
    },
    {
      q: "Which is NOT a negative consequence of technological innovation mentioned in the lecture?",
      options: [
        "Social isolation",
        "Cyberbullying",
        "Lower production costs",
        "Difficulty disconnecting from work"
      ],
      correct: 2,
      explanation: "Lower production costs is a POSITIVE effect. The negatives listed include casualties, social isolation, cyberbullying, difficulty disconnecting, and 'dead internet theory'."
    },
    {
      q: "A technology trajectory is best defined as:",
      options: [
        "The marketing plan for a new product",
        "The total number of products sold over time",
        "The path of evolution of a technology",
        "The organizational structure of a tech company"
      ],
      correct: 2,
      explanation: "From the course dictionary: technology trajectory = path of evolution of a technology. Moore's Law is the classic example."
    },
    {
      q: "According to the lecture, 'competitive advantage' is defined as:",
      options: [
        "Having the largest market share",
        "The ability to retain profitability",
        "Being the first to enter a market",
        "Having the most patents"
      ],
      correct: 1,
      explanation: "From the course dictionary: competitive advantage = ability to retain profitability."
    },
    {
      q: "Henry Ford's moving assembly line is an example of:",
      options: [
        "Product innovation",
        "Marketing innovation",
        "Process innovation",
        "Business model innovation"
      ],
      correct: 2,
      explanation: "The Model T itself was product innovation. The moving assembly line was process innovation — it changed HOW the product was manufactured, not the product itself."
    },
    {
      q: "What three questions define a business model?",
      options: [
        "What to build? Who to hire? Where to sell?",
        "How to create value? How to deliver value? How to capture value?",
        "What is the technology? Who is the customer? What is the price?",
        "How to innovate? How to patent? How to scale?"
      ],
      correct: 1,
      explanation: "From the lecture slide: a business model answers three questions: (1) How do we create value? (2) How do we deliver value? (3) How do we capture value?"
    }
  ],

  "Lectures 2-3: Technology Evolution": [
    {
      q: "In the Abernathy-Utterback model, which phase comes first?",
      options: [
        "Specific phase",
        "Transitional phase",
        "Fluid phase",
        "Consolidation phase"
      ],
      correct: 2,
      explanation: "The fluid phase comes first — characterized by high uncertainty, many competing designs, and product innovation. It ends when a dominant design emerges."
    },
    {
      q: "A shakeout in an industry typically results in approximately what percentage of firms exiting?",
      options: [
        "About 10%",
        "About 25%",
        "About 52%",
        "About 90%"
      ],
      correct: 2,
      explanation: "Shane cites data showing the average industry loses about 52% of its firms during a shakeout, though it ranges from 4% (shampoo) to 87% (DDT)."
    },
    {
      q: "Why is the technology S-curve S-shaped?",
      options: [
        "Because sales always follow an S-pattern",
        "Because improvement is slow at first (unknown drivers), fast in the middle, and slow again as limits approach",
        "Because firms enter and exit in waves",
        "Because adoption follows a normal distribution"
      ],
      correct: 1,
      explanation: "Early: slow gains because key performance drivers are unclear. Middle: rapid improvement once drivers are understood. Late: diminishing returns as physical limits approach."
    },
    {
      q: "According to Christensen, what strategy should an incumbent use to respond to disruptive technology?",
      options: [
        "Ignore it and focus on core customers",
        "Improve the existing technology faster",
        "Create a separate organization to pursue the disruptive technology",
        "Sue the disruptive entrants for patent infringement"
      ],
      correct: 2,
      explanation: "Christensen advises incumbents to create or invest in an independent organization that can focus on new customers and develop the disruptive technology without being constrained by the existing business."
    },
    {
      q: "The shift from vacuum tubes to integrated circuits is an example of:",
      options: [
        "Competence-enhancing radical innovation",
        "Competence-destroying radical innovation",
        "Incremental innovation",
        "Architectural innovation"
      ],
      correct: 1,
      explanation: "Integrated circuits required completely different knowledge (semiconductor physics) than vacuum tubes (glass-blowing, gas physics). The old competencies became obsolete."
    },
    {
      q: "In Barras's reverse product cycle for services, innovation progresses in which order?",
      options: [
        "New services → improved quality → improved efficiency",
        "Improved efficiency → improved quality → new services",
        "Product innovation → process innovation → service innovation",
        "Radical innovation → incremental innovation → dominant design"
      ],
      correct: 1,
      explanation: "In services, technology first improves efficiency (e.g., computerized records), then service quality (better claims handling), then creates entirely new services (online quotation). This is opposite to manufacturing."
    },
    {
      q: "An architectural innovation changes:",
      options: [
        "Both the components and the linkages between them",
        "The components but not the linkages between them",
        "The linkages between components but not the components themselves",
        "Neither the components nor the linkages"
      ],
      correct: 2,
      explanation: "Henderson and Clark: architectural innovation changes how components are linked together while leaving the components largely intact. Example: portable DVD player vs desktop DVD player."
    },
    {
      q: "During the fluid phase of the Abernathy-Utterback model, which type of firm typically performs best?",
      options: [
        "Large established firms with scale economies",
        "New firms that can experiment with novel product designs",
        "Firms that focus on process innovation",
        "Government-funded research labs"
      ],
      correct: 1,
      explanation: "New firms thrive in the fluid phase because the game is experimentation and product variety. Once the dominant design emerges (specific phase), incumbents gain advantage through scale and process efficiency."
    },
    {
      q: "Which of the following is NOT one of the six reasons incumbents fail to shift the S-curve?",
      options: [
        "The new technology cannibalizes existing sales",
        "Managers do not see the new technology as a threat",
        "Incumbents lack the technical skill to develop the new technology",
        "Organizational politics resist reorienting around the new technology"
      ],
      correct: 2,
      explanation: "Incumbents often HAVE the technical skill — Kodak invented the digital camera, AT&T invented VOIP compression. The issue is incentives, sunk costs, cannibalization, managerial blindness, ability to improve old tech, and organizational resistance."
    },
    {
      q: "The Segway is used as an example of:",
      options: [
        "A successful paradigm shift in transportation",
        "A technology that was hyped as paradigm-shifting but failed to disrupt",
        "Disruptive innovation entering from a niche market",
        "Competence-destroying innovation"
      ],
      correct: 1,
      explanation: "Despite John Doerr calling it more important than the Internet, the Segway failed to shift the transportation paradigm. It shows that identifying paradigm shifts in advance is extremely difficult."
    }
  ],

  "Lecture 4: Adoption & Diffusion": [
    {
      q: "The five adopter categories in order are:",
      options: [
        "Leaders, followers, majority, laggards, resistors",
        "Innovators, early adopters, early majority, late majority, laggards",
        "Pioneers, early movers, mainstream, late movers, resistors",
        "Experimenters, validators, pragmatists, conservatives, skeptics"
      ],
      correct: 1,
      explanation: "The standard adopter categories: Innovators (2.5%), Early adopters (13.5%), Early majority (34%), Late majority (34%), Laggards (16%)."
    },
    {
      q: "Why is 'crossing the chasm' so difficult?",
      options: [
        "Because the technology usually gets worse over time",
        "Because early adopters and the early majority buy for fundamentally different reasons",
        "Because laggards block adoption",
        "Because patents expire before mainstream adoption"
      ],
      correct: 1,
      explanation: "Early adopters buy for novelty and technical interest. The early majority wants complete solutions, proven value, low risk, and reliability. The product and marketing must change."
    },
    {
      q: "A beachhead strategy means:",
      options: [
        "Launching in all markets simultaneously",
        "Focusing on one niche segment first, then expanding outward",
        "Competing directly with the market leader",
        "Using aggressive pricing to capture the entire market"
      ],
      correct: 1,
      explanation: "Win one focused segment first to build credibility, references, and a refined offering. Then expand from that position of strength."
    },
    {
      q: "The adoption S-curve differs from the technology S-curve because:",
      options: [
        "They measure the same thing but in different industries",
        "The adoption S-curve shows cumulative market adoption over time, while the technology S-curve shows performance versus effort",
        "The technology S-curve is always steeper",
        "The adoption S-curve only applies to services"
      ],
      correct: 1,
      explanation: "Technology S-curve: performance (y) vs effort (x). Adoption S-curve: cumulative adoption (y) vs time (x). Same shape, completely different meaning."
    },
    {
      q: "Technology substitution is particularly harmful to incumbents because:",
      options: [
        "It always happens overnight",
        "They have large investments in the old technology that must be written off",
        "Customers always prefer new technology",
        "Governments force them to switch"
      ],
      correct: 1,
      explanation: "Incumbents have sunk costs in old equipment, systems, routines, and business models. Substitution forces write-downs and painful restructuring."
    },
    {
      q: "The early majority prefers to buy from market leaders because:",
      options: [
        "Market leaders always have the lowest prices",
        "Leaders are seen as safer, more reliable, and more likely to provide ongoing support",
        "Governments require purchasing from large firms",
        "Leaders always have the best technology"
      ],
      correct: 1,
      explanation: "The early majority is risk-averse and pragmatic. They see market leaders as safer bets for long-term support, compatibility, and reliability."
    },
    {
      q: "What does the Bass model use to predict diffusion?",
      options: [
        "Patent citations and R&D spending",
        "Rate of innovator adoption, rate of imitator adoption, and market size",
        "Price elasticity and advertising spend",
        "Number of competitors and market share"
      ],
      correct: 1,
      explanation: "The Bass model estimates diffusion patterns using three parameters: the coefficient of innovation (independent adopters), the coefficient of imitation (influenced adopters), and the total potential market size."
    },
    {
      q: "Complementary technologies affect diffusion because:",
      options: [
        "They always speed up adoption",
        "Systemic innovations can only diffuse as fast as their slowest essential complement",
        "They make the core technology cheaper",
        "They are required by patent law"
      ],
      correct: 1,
      explanation: "Example: fuel cell cars need refueling infrastructure. Music downloads needed portable MP3 players. If the complement is missing, the core technology stalls."
    },
    {
      q: "Self-substitution (cannibalizing your own product) is risky because:",
      options: [
        "It is illegal in most markets",
        "If timed poorly, you lose old revenue before the new product is strong enough",
        "Customers never accept replacement products from the same company",
        "It always reduces total market size"
      ],
      correct: 1,
      explanation: "You bear development costs and weaken existing revenue. If the new product isn't ready or the market hasn't shifted, you damage yourself without gaining the new position."
    },
    {
      q: "Which adopter group is least price sensitive and most willing to buy prototypes?",
      options: [
        "Early majority",
        "Late majority",
        "Innovators",
        "Early adopters"
      ],
      correct: 2,
      explanation: "Innovators (2.5% of adopters) buy because the product is new and interesting. They tolerate high prices, incomplete products, and beta versions."
    }
  ],

  "Lecture 5: Sources of Innovation": [
    {
      q: "According to Shane, the three sources of innovative opportunity are:",
      options: [
        "Scientific research, government funding, and customer feedback",
        "Technological change, political/regulatory change, and social/demographic change",
        "R&D spending, patent licensing, and market research",
        "Universities, corporations, and entrepreneurs"
      ],
      correct: 1,
      explanation: "Shane identifies three sources: (1) technological change enables new capabilities, (2) political/regulatory change incentivizes or forces innovation via subsidies or laws, (3) social/demographic changes create new needs."
    },
    {
      q: "Most innovation originates in:",
      options: [
        "Universities",
        "Government laboratories",
        "Individual inventors working independently",
        "Firms"
      ],
      correct: 3,
      explanation: "From the lecture: most innovations originate in firms. However, individuals within firms are important for commercialization, universities for R&D, and governments for funding R&D."
    },
    {
      q: "P&G's 'Connect and Develop' strategy is an example of:",
      options: [
        "Closed innovation — doing all R&D internally",
        "Open innovation — sourcing ideas from external partners",
        "Disruptive innovation from a startup",
        "Government-funded R&D"
      ],
      correct: 1,
      explanation: "P&G shifted from doing 100% of R&D internally to sourcing ideas externally through partnerships, licensing, and acquisitions. This is the open innovation model."
    },
    {
      q: "Which is NOT a reason firms invest in R&D according to the lecture?",
      options: [
        "To create new technologies and IP",
        "To develop new products",
        "To absorb externally generated ideas",
        "To reduce their tax burden"
      ],
      correct: 3,
      explanation: "The lecture lists four reasons: create new technologies/IP, develop new products, differentiate from competitors, and absorb externally generated ideas. Tax reduction is not listed as a primary motive."
    },
    {
      q: "The difference between basic research and applied research is:",
      options: [
        "Basic research is done by firms; applied research is done by universities",
        "Basic research seeks fundamental understanding; applied research seeks to solve a specific practical problem",
        "Applied research is always more expensive",
        "Basic research always leads to commercial products"
      ],
      correct: 1,
      explanation: "Basic research (Bohr quadrant) seeks fundamental scientific understanding. Applied research (Pasteur/Edison quadrants) targets specific practical problems or applications."
    },
    {
      q: "Google ATAP identifies radical innovation projects by:",
      options: [
        "Using consensus-based decision making",
        "Copying competitors' R&D portfolios",
        "Recognizing inflection points in science and uncovering unmet user needs, without using consensus",
        "Conducting large-scale customer surveys"
      ],
      correct: 2,
      explanation: "From the lecture: ATAP uses DARPA-inspired principles (ambitious goals, temporary teams, independence). It does NOT use consensus because breakthrough innovations don't lend themselves to it."
    },
    {
      q: "Political change can drive innovation by:",
      options: [
        "Only blocking unwanted technologies",
        "Incentivizing innovation through subsidies or forcing it through laws",
        "Reducing the need for patents",
        "Eliminating competition"

// ============================================================
// HISTORY (localStorage)
// ============================================================
function getHistory() {
  try { return JSON.parse(localStorage.getItem('ent3620_history') || '{}'); } catch(e) { return {}; }
}
function saveAttempt(module, score, total, wrong) {
  const history = getHistory();
  if (!history[module]) history[module] = [];
  history[module].push({
    date: new Date().toISOString(),
    score, total,
    pct: Math.round((score/total)*100),
    wrongQuestions: wrong.map(w => w.question)
  });
  localStorage.setItem('ent3620_history', JSON.stringify(history));
}
function getBest(module) {
  const history = getHistory();
  if (!history[module] || history[module].length === 0) return null;
  return Math.max(...history[module].map(a => a.pct));
}
function getAttemptCount(module) {
  const history = getHistory();
  if (!history[module]) return 0;
  return history[module].length;
}
function getAllStats() {
  const history = getHistory();
  let totalAttempts = 0, totalCorrect = 0, totalQuestions = 0;
  Object.values(history).forEach(attempts => {
    attempts.forEach(a => { totalAttempts++; totalCorrect += a.score; totalQuestions += a.total; });
  });
  return { totalAttempts, totalCorrect, totalQuestions, avgPct: totalQuestions > 0 ? Math.round((totalCorrect/totalQuestions)*100) : 0 };
}

// ============================================================
// APP STATE
// ============================================================
let currentQuiz = [];
let currentIndex = 0;
let score = 0;
let wrongAnswers = [];
let currentLecture = "";
let streak = 0;
let bestStreak = 0;

const correctMessages = ["Correct!", "Nice!", "Nailed it!", "Exactly!", "You got it!", "Sharp!", "Right on!", "Clean!", "Spot on!", "Easy money!"];
const streakMessages = { 3: "Hat trick!", 5: "On fire!", 7: "Unstoppable!", 10: "LEGENDARY!" };
const wrongMessages = ["Not quite.", "Close!", "Tricky one.", "Review this.", "Almost."];
const confettiEmojis = ['🎯', '⭐', '💡', '🔥', '✨'];

function spawnConfetti(count) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = confettiEmojis[Math.floor(Math.random() * confettiEmojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (1.5 + Math.random()) + 's';
    el.style.animationDelay = Math.random() * 0.3 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

function showComboText(text) {
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.textContent = text;
  el.style.color = '#4a9f5a';
  el.style.textShadow = '0 0 30px rgba(74,159,90,0.5)';
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.transition = 'all 0.6s ease';
    el.style.opacity = '1';
    el.style.transform = 'translate(-50%, -60%)';
  });
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%, -80%)';
    setTimeout(() => el.remove(), 600);
  }, 800);
}

function updateStreakBadge() {
  const badge = document.getElementById('streak-badge');
  if (streak >= 3) {
    badge.className = 'streak-badge active' + (streak >= 7 ? ' super' : streak >= 5 ? ' fire' : '');
    badge.textContent = (streak >= 7 ? '🔥🔥 ' : streak >= 5 ? '🔥 ' : '⚡ ') + streak + ' streak';
  } else {
    badge.className = 'streak-badge';
  }
}

// ============================================================
// MENU
// ============================================================
function buildMenu() {
  const menu = document.getElementById('menu-buttons');
  menu.innerHTML = '';

  // All questions button
  let totalQ = 0;
  Object.values(questionBank).forEach(qs => totalQ += qs.length);

  const allBtn = document.createElement('div');
  allBtn.className = 'menu-btn all';
  allBtn.innerHTML = `<div class="label">All Lectures — Full Exam Simulation</div><div class="desc">Randomized questions from every module</div><div class="count">${totalQ} questions</div>`;
  allBtn.onclick = () => startQuiz('all');
  menu.appendChild(allBtn);

  // Stats bar
  const stats = getAllStats();
  if (stats.totalAttempts > 0) {
    const statsDiv = document.createElement('div');
    statsDiv.style.cssText = 'grid-column:1/-1;padding:12px 18px;background:#1a1a2e;border:1px solid #333;border-radius:12px;display:flex;justify-content:space-between;font-size:13px;color:#888;';
    statsDiv.innerHTML = `<span>Total attempts: ${stats.totalAttempts}</span><span>Questions answered: ${stats.totalQuestions}</span><span>Average: <span style="color:${stats.avgPct >= 80 ? '#4a9f5a' : stats.avgPct >= 60 ? '#c9a227' : '#9f4a4a'};font-weight:600">${stats.avgPct}%</span></span>`;
    menu.appendChild(statsDiv);
  }

  // Per-lecture buttons
  Object.keys(questionBank).forEach(lecture => {
    const btn = document.createElement('div');
    btn.className = 'menu-btn';
    const best = getBest(lecture);
    const attempts = getAttemptCount(lecture);
    let bestHtml = '';
    if (best !== null) {
      const bestColor = best >= 80 ? '#4a9f5a' : best >= 60 ? '#c9a227' : '#9f4a4a';
      bestHtml = `<div style="font-size:12px;margin-top:4px;"><span style="color:${bestColor};font-weight:600">Best: ${best}%</span> <span style="color:#666">| ${attempts} attempt${attempts !== 1 ? 's' : ''}</span></div>`;
    }
    btn.innerHTML = `<div class="label">${lecture}</div><div class="count">${questionBank[lecture].length} questions</div>${bestHtml}`;
    btn.onclick = () => startQuiz(lecture);
    menu.appendChild(btn);
  });
}

// ============================================================
// QUIZ LOGIC
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(lecture) {
  currentLecture = lecture;
  if (lecture === 'all') {
    currentQuiz = shuffle(Object.values(questionBank).flat());
  } else {
    currentQuiz = shuffle(questionBank[lecture]);
  }

  // Randomize answer positions for each question
  currentQuiz = currentQuiz.map(q => {
    const correctText = q.options[q.correct];
    const shuffled = shuffle(q.options);
    return {
      ...q,
      options: shuffled,
      correct: shuffled.indexOf(correctText)
    };
  });

  currentIndex = 0;
  score = 0;
  streak = 0;
  bestStreak = 0;
  wrongAnswers = [];

  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');

  showQuestion();
}

function showQuestion() {
  const q = currentQuiz[currentIndex];
  document.getElementById('q-label').textContent = `Question ${currentIndex + 1} of ${currentQuiz.length}`;
  document.getElementById('q-progress').textContent = `${currentIndex + 1}/${currentQuiz.length}`;
  document.getElementById('q-score').textContent = score;
  document.getElementById('progress-fill').style.width = `${((currentIndex) / currentQuiz.length) * 100}%`;
  document.getElementById('q-text').textContent = q.q;

  const optionsEl = document.getElementById('q-options');
  optionsEl.innerHTML = '';

  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = `${String.fromCharCode(65 + i)}) ${opt}`;
    div.onclick = () => selectAnswer(i);
    optionsEl.appendChild(div);
  });

  document.getElementById('q-explanation').style.display = 'none';
  document.getElementById('q-explanation').classList.remove('wrong-exp');
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('feedback-msg').textContent = '';
}

function selectAnswer(selected) {
  const q = currentQuiz[currentIndex];
  const options = document.querySelectorAll('.option');

  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (i === q.correct) opt.classList.add('correct');
    if (i === selected && selected !== q.correct) opt.classList.add('wrong');
  });

  const expEl = document.getElementById('q-explanation');
  expEl.textContent = q.explanation;
  expEl.style.display = 'block';

  const feedbackEl = document.getElementById('feedback-msg');
  if (selected === q.correct) {
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    document.getElementById('q-score').textContent = score;

    // Feedback message
    const msg = streakMessages[streak] || correctMessages[Math.floor(Math.random() * correctMessages.length)];
    feedbackEl.className = 'feedback-msg correct-msg';
    feedbackEl.textContent = msg;

    // Confetti on streaks
    if (streak >= 10) { spawnConfetti(15); showComboText('LEGENDARY!'); }
    else if (streak >= 7) { spawnConfetti(10); showComboText('Unstoppable!'); }
    else if (streak >= 5) { spawnConfetti(6); showComboText('On fire!'); }
    else if (streak >= 3) { spawnConfetti(3); }

    updateStreakBadge();
  } else {
    streak = 0;
    updateStreakBadge();
    expEl.classList.add('wrong-exp');
    feedbackEl.className = 'feedback-msg wrong-msg';
    feedbackEl.textContent = wrongMessages[Math.floor(Math.random() * wrongMessages.length)];
    wrongAnswers.push({
      question: q.q,
      yourAnswer: q.options[selected],
      correctAnswer: q.options[q.correct],
      explanation: q.explanation,
      originalQ: q
    });
  }

  document.getElementById('next-btn').style.display = 'block';
  document.getElementById('next-btn').textContent =
    currentIndex === currentQuiz.length - 1 ? 'See Results' : 'Next Question';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuiz.length) {
    showResults();
  } else {
    showQuestion();
  }
}

// ============================================================
// RESULTS
// ============================================================
function showResults() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('results-screen').classList.remove('hidden');

  // Save to history
  saveAttempt(currentLecture, score, currentQuiz.length, wrongAnswers);

  const pct = Math.round((score / currentQuiz.length) * 100);
  const scoreEl = document.getElementById('r-score');
  scoreEl.textContent = `${pct}%`;
  scoreEl.className = 'big-score' + (pct >= 80 ? '' : pct >= 60 ? ' low' : ' fail');

  document.getElementById('r-out-of').textContent = `${score} out of ${currentQuiz.length} correct` + (bestStreak >= 3 ? ` | Best streak: ${bestStreak} 🔥` : '');

  let grade = '';
  if (pct >= 90) grade = 'A';
  else if (pct >= 80) grade = 'B';
  else if (pct >= 68) grade = 'C';
  else if (pct >= 56) grade = 'D';
  else if (pct >= 40) grade = 'E';
  else grade = 'F';
  document.getElementById('r-grade').textContent = `Estimated grade: ${grade}`;

  // Wrong answers review
  const reviewEl = document.getElementById('wrong-review');
  const listEl = document.getElementById('wrong-list');

  if (wrongAnswers.length > 0) {
    reviewEl.classList.remove('hidden');
    listEl.innerHTML = '';
    wrongAnswers.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `
        <div class="wq">${w.question}</div>
        <div class="wa">Your answer: ${w.yourAnswer}</div>
        <div class="wc">Correct: ${w.correctAnswer}</div>
        <div style="color:#888;font-size:13px;margin-top:6px;">${w.explanation}</div>
      `;
      listEl.appendChild(div);
    });
  } else {
    reviewEl.classList.add('hidden');
  }
}

function retryWrong() {
  if (wrongAnswers.length === 0) { showMenu(); return; }

  currentQuiz = shuffle(wrongAnswers.map(w => w.originalQ));
  // Re-randomize answer positions
  currentQuiz = currentQuiz.map(q => {
    const correctText = q.options[q.correct];
    const shuffled = shuffle(q.options);
    return { ...q, options: shuffled, correct: shuffled.indexOf(correctText) };
  });

  currentIndex = 0;
  score = 0;
  wrongAnswers = [];

  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  showQuestion();
}

function showMenu() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  buildMenu(); // Rebuild to show updated scores
}

// INIT
// ============================================================
buildMenu();
