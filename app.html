<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENT3620 Study Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a; --bg2: #1a1a2e; --border: #333; --text: #e0e0e0; --text2: #888;
    --accent: #4a6fa5; --accent2: #5a8fc5; --green: #4a9f5a; --red: #9f4a4a;
  }
  .light {
    --bg: #f5f5f7; --bg2: #ffffff; --border: #ddd; --text: #1a1a1a; --text2: #666;
    --accent: #3a5f95; --accent2: #4a7fb5; --green: #3a8f4a; --red: #c44a4a;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Top bar */
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 100; }
  .topbar h1 { font-size: 18px; color: var(--text); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 10px; }
  .tab { padding: 8px 20px; border-radius: 8px; border: none; background: transparent; color: var(--text2); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { background: var(--border); color: var(--text); }

  /* Theme toggle */
  .theme-toggle { width: 48px; height: 26px; border-radius: 13px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; position: relative; transition: all 0.3s; }
  .theme-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); transition: all 0.3s; }
  .light .theme-toggle::after { left: 25px; background: #f59e0b; }
  .theme-icon { font-size: 14px; position: absolute; top: 4px; }
  .theme-icon.moon { left: 6px; }
  .theme-icon.sun { right: 5px; }

  /* Content frame */
  .content { width: 100%; height: calc(100vh - 53px); border: none; }

  /* GitHub link */
  .github-link { color: var(--text2); text-decoration: none; font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; transition: all 0.2s; }
  .github-link:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>
  <div class="topbar">
    <h1>ENT3620 Study Hub</h1>
    <div class="topbar-right">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('quiz')">Quiz</button>
        <button class="tab" onclick="switchTab('flashcards')">Flashcards</button>
      </div>
      <div class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <span class="theme-icon moon">🌙</span>
        <span class="theme-icon sun">☀️</span>
      </div>
    </div>
  </div>
  <iframe id="content-frame" class="content" src="index.html"></iframe>

<script>
  // Theme
  const savedTheme = localStorage.getItem('ent3620_theme') || 'dark';
  if (savedTheme === 'light') document.body.classList.add('light');

  function toggleTheme() {
    document.body.classList.toggle('light');
    const isLight = document.body.classList.contains('light');
    localStorage.setItem('ent3620_theme', isLight ? 'light' : 'dark');
    // Pass theme to iframe
    const frame = document.getElementById('content-frame');
    frame.contentWindow.postMessage({ type: 'theme', theme: isLight ? 'light' : 'dark' }, '*');
  }

  // Tabs
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    const frame = document.getElementById('content-frame');
    frame.src = tab === 'quiz' ? 'index.html' : 'flashcards.html';
  }

  // Pass theme on load
  window.addEventListener('message', (e) => {
    if (e.data?.type === 'ready') {
      const isLight = document.body.classList.contains('light');
      const frame = document.getElementById('content-frame');
      frame.contentWindow.postMessage({ type: 'theme', theme: isLight ? 'light' : 'dark' }, '*');
    }
  });
</script>
</body>
</html>
